global:
  controllerServiceAccount:
    namespace: arc-system
    name: bastet-cat-controller-stg-gha-rs-controller
  containerMode:
    type: dind
  environment: stg
  externalSecret:
    path: bastet-cat/arc-system
  extraAnnotations: {}
  extraLabels: {}
  flavours: {}
  githubConfigUrl: "https://github.com/bastet-cat"
  minRunners: 0
  maxRunners: 5
  org: bastet-cat
  listenerTemplate:
    spec:
      containers:
      - name: listener
        securityContext:
          runAsUser: 1000
